<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 290" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&amp;family=Source+Sans+3:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- PROJECT DIRECTOR -->
  <rect x="270" y="10" width="260" height="65" rx="12" fill="#00AEEF"/>
  <text font-family="'DM Sans', sans-serif" font-weight="600" font-size="18" fill="#FFFFFF" text-anchor="middle" x="400" y="38">Project Director</text>
  <text font-family="'Source Sans 3', sans-serif" font-weight="400" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" x="400" y="58">Oversees all engagements</text>

  <!-- Line: Director down to split -->
  <line x1="400" y1="75" x2="400" y2="100" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <!-- Horizontal bar splitting to EM and DEM -->
  <line x1="200" y1="100" x2="600" y2="100" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <!-- Line down to EM -->
  <line x1="200" y1="100" x2="200" y2="115" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <!-- Line down to DEM -->
  <line x1="600" y1="100" x2="600" y2="115" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>

  <!-- ENGAGEMENT MANAGER -->
  <rect x="70" y="115" width="260" height="58" rx="12" fill="#FFFFFF" stroke="#B8E4F8" stroke-width="2"/>
  <text font-family="'DM Sans', sans-serif" font-weight="500" font-size="15" fill="#2D2D2D" text-anchor="middle" x="200" y="140">Engagement Manager</text>
  <text font-family="'Source Sans 3', sans-serif" font-weight="400" font-size="12" fill="#808285" text-anchor="middle" x="200" y="160">Leads the project. Client contact.</text>

  <!-- DEPUTY EM -->
  <rect x="470" y="115" width="260" height="58" rx="12" fill="#FFFFFF" stroke="#B8E4F8" stroke-width="2"/>
  <text font-family="'DM Sans', sans-serif" font-weight="500" font-size="15" fill="#2D2D2D" text-anchor="middle" x="600" y="140">Deputy Engagement Manager</text>
  <text font-family="'Source Sans 3', sans-serif" font-weight="400" font-size="12" fill="#808285" text-anchor="middle" x="600" y="160">Supports EM. Tracks deliverables.</text>

  <!-- Horizontal line: right-middle of EM to left-middle of DEM -->
  <line x1="330" y1="144" x2="470" y2="144" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <!-- Vertical line down from midpoint -->
  <line x1="400" y1="144" x2="400" y2="195" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>

  <!-- Horizontal bar for consultants -->
  <line x1="140" y1="195" x2="660" y2="195" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>

  <!-- 4 vertical lines down to consultants -->
  <line x1="140" y1="195" x2="140" y2="215" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <line x1="313" y1="195" x2="313" y2="215" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <line x1="487" y1="195" x2="487" y2="215" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>
  <line x1="660" y1="195" x2="660" y2="215" stroke="#00AEEF" stroke-width="2" opacity="0.35"/>

  <!-- 4 CONSULTANT CHIPS -->
  <rect x="75" y="215" width="130" height="38" rx="8" fill="#FFFFFF" stroke="#B8E4F8" stroke-width="2"/>
  <text font-family="'DM Sans', sans-serif" font-weight="500" font-size="14" fill="#2D2D2D" text-anchor="middle" x="140" y="239">Consultant</text>

  <rect x="248" y="215" width="130" height="38" rx="8" fill="#FFFFFF" stroke="#B8E4F8" stroke-width="2"/>
  <text font-family="'DM Sans', sans-serif" font-weight="500" font-size="14" fill="#2D2D2D" text-anchor="middle" x="313" y="239">Consultant</text>

  <rect x="422" y="215" width="130" height="38" rx="8" fill="#FFFFFF" stroke="#B8E4F8" stroke-width="2"/>
  <text font-family="'DM Sans', sans-serif" font-weight="500" font-size="14" fill="#2D2D2D" text-anchor="middle" x="487" y="239">Consultant</text>

  <rect x="595" y="215" width="130" height="38" rx="8" fill="#FFFFFF" stroke="#B8E4F8" stroke-width="2"/>
  <text font-family="'DM Sans', sans-serif" font-weight="500" font-size="14" fill="#2D2D2D" text-anchor="middle" x="660" y="239">Consultant</text>
</svg>
